<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Base -->
  <rect width="800" height="900" fill="url(#g1)"/>
  <!-- Abstract shapes -->
  <circle cx="650" cy="200" r="300" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="700" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="750" r="200" fill="rgba(255,255,255,0.05)"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="100" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="400" cy="100" r="2"/><circle cx="500" cy="100" r="2"/><circle cx="600" cy="100" r="2"/><circle cx="700" cy="100" r="2"/>
    <circle cx="100" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="500" cy="200" r="2"/><circle cx="600" cy="200" r="2"/><circle cx="700" cy="200" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="200" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="400" cy="300" r="2"/><circle cx="500" cy="300" r="2"/><circle cx="600" cy="300" r="2"/><circle cx="700" cy="300" r="2"/>
    <circle cx="100" cy="400" r="2"/><circle cx="200" cy="400" r="2"/><circle cx="300" cy="400" r="2"/><circle cx="400" cy="400" r="2"/><circle cx="500" cy="400" r="2"/><circle cx="600" cy="400" r="2"/><circle cx="700" cy="400" r="2"/>
    <circle cx="100" cy="500" r="2"/><circle cx="200" cy="500" r="2"/><circle cx="300" cy="500" r="2"/><circle cx="400" cy="500" r="2"/><circle cx="500" cy="500" r="2"/><circle cx="600" cy="500" r="2"/><circle cx="700" cy="500" r="2"/>
    <circle cx="100" cy="600" r="2"/><circle cx="200" cy="600" r="2"/><circle cx="300" cy="600" r="2"/><circle cx="400" cy="600" r="2"/><circle cx="500" cy="600" r="2"/><circle cx="600" cy="600" r="2"/><circle cx="700" cy="600" r="2"/>
    <circle cx="100" cy="700" r="2"/><circle cx="200" cy="700" r="2"/><circle cx="300" cy="700" r="2"/><circle cx="400" cy="700" r="2"/><circle cx="500" cy="700" r="2"/><circle cx="600" cy="700" r="2"/><circle cx="700" cy="700" r="2"/>
    <circle cx="100" cy="800" r="2"/><circle cx="200" cy="800" r="2"/><circle cx="300" cy="800" r="2"/><circle cx="400" cy="800" r="2"/><circle cx="500" cy="800" r="2"/><circle cx="600" cy="800" r="2"/><circle cx="700" cy="800" r="2"/>
  </g>
  <!-- Geometric lines -->
  <line x1="0" y1="300" x2="800" y2="200" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="0" y1="500" x2="800" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="700" x2="800" y2="600" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- HZ watermark -->
  <text x="400" y="480" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="180" fill="rgba(255,255,255,0.04)" letter-spacing="-5">HZ</text>
</svg>
