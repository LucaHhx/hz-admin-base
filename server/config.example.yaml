# ===================== 系统核心配置 =====================
system:
  db-type: sqlite
  oss-type: local
  addr: 9688
  api-addr: 9689
  iplimit-count: 15000
  iplimit-time: 3600
  use-redis: false
  use-mongo: false
  use-strict-auth: true
  time-zone: "Asia/Shanghai"
  migration: true
  translation-dir: ./translation
  environment: dev

# ===================== 数据库配置 =====================
mysql:
  path: 127.0.0.1
  port: "3306"
  db-name: hab
  username: root
  password: your-password
  config: charset=utf8mb4&parseTime=True&loc=Local
  log-mode: info
  max-idle-conns: 10
  max-open-conns: 100

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

# ===================== JWT 认证 =====================
jwt:
  signing-key: d92a1971-6b0f-49a5-9222-adb2d132a009
  expires-time: 7d
  buffer-time: 1d
  issuer: qmPlus

# ===================== 验证码 =====================
captcha:
  key-long: 6
  img-width: 240
  img-height: 80
  open-captcha: 0
  open-captcha-timeout: 3600

# ===================== 代码生成器 =====================
autocode:
  web: web/src
  server: server
  module: hab
  api-key: ""  # 留空表示禁用 API Key 认证；填入随机字符串启用

# ===================== 本地文件存储 =====================
local:
  path: uploads/file
  store-path: uploads/file

excel:
  dir: ./resource/excel/

# ===================== 日志 =====================
zap:
  level: info
  prefix: '[hab]'
  format: console
  director: log
  encode-level: LowercaseColorLevelEncoder
  stacktrace-key: stacktrace
  show-line: true
  log-in-console: true
  retention-day: -1

