# ===================== 完整配置模板 =====================
# 所有字段均已列出默认值（与 config/defaults.go 一致）
# 复制为 config.local.yaml 后修改敏感字段即可使用
# config.local.yaml 在 .gitignore 中，不入库

# ===================== 系统核心配置 =====================
system:
  db-type: sqlite          # 数据库类型: sqlite | mysql | pgsql | mssql | oracle
  oss-type: local          # 文件存储: local | aliyun | minio | aws | tencent | huawei
  addr: 9688               # 后台管理接口端口（web/ 连接此端口）
  api-addr: 9689           # 客户端/外部 API 端口（client/ 连接此端口）
  router-prefix: ""        # API 路由前缀（如 /api/v1）
  iplimit-count: 15000     # IP 限流：时间窗口内最大请求数
  iplimit-time: 3600       # IP 限流：时间窗口（秒）
  use-multipoint: false    # 多点登录拦截（需 Redis）
  use-redis: false         # 是否启用 Redis 缓存
  use-mongo: false         # 是否启用 MongoDB
  use-strict-auth: true    # 是否启用严格鉴权（Casbin）
  time-zone: "UTC"         # 时区
  migration: true          # 启动时自动迁移数据库
  translation-dir: ./translation  # i18n 翻译文件目录
  environment: dev         # 环境: dev | production
  login-mode: simple       # 登录模式: simple(无验证码) | captcha(需验证码) | strict(分步强验证)

# ===================== 数据库配置 =====================
# 只需配置 db-type 对应的数据库，其余可省略

# SQLite（db-type: sqlite 时生效）
sqlite:
  db-name: data            # 数据库文件名（自动生成 data.db）
  path: ""                 # 存储路径（空=当前目录）
  max-idle-conns: 10       # 最大空闲连接数
  max-open-conns: 100      # 最大打开连接数
  log-mode: info           # SQL 日志级别: silent | error | warn | info

# MySQL（db-type: mysql 时生效）
mysql:
  path: 127.0.0.1          # MySQL 地址
  port: "3306"             # MySQL 端口
  db-name: hab             # 数据库名
  username: root           # 用户名
  password: your-password  # 密码（请在 config.local.yaml 中设置真实密码）
  config: charset=utf8mb4&parseTime=True&loc=Local  # 连接参数
  engine: InnoDB           # 数据库引擎
  log-mode: info           # SQL 日志级别: silent | error | warn | info
  max-idle-conns: 10       # 最大空闲连接数
  max-open-conns: 100      # 最大打开连接数

# PostgreSQL（db-type: pgsql 时生效）
# pgsql:
#   path: 127.0.0.1
#   port: "5432"
#   db-name: hab
#   username: postgres
#   password: your-password
#   config: "sslmode=disable TimeZone=UTC"
#   log-mode: info
#   max-idle-conns: 10
#   max-open-conns: 100

# Redis（可选，use-redis: true 时需要）
redis:
  addr: 127.0.0.1:6379     # Redis 地址
  password: ""             # Redis 密码
  db: 0                    # Redis 数据库编号

# ===================== JWT 认证 =====================
jwt:
  signing-key: ""          # JWT 签名密钥（留空则自动生成 UUID，建议手动 uuidgen 设置固定值）
  expires-time: 7d         # Token 过期时间（格式: Nd/Nh/Nm）
  buffer-time: 1d          # Token 刷新缓冲期
  issuer: hab              # 签发者

# ===================== 验证码 =====================
captcha:
  key-long: 6              # 验证码位数
  img-width: 240           # 图片宽度
  img-height: 80           # 图片高度
  open-captcha: 0          # 0=总是需要, >0=错误N次后需要
  open-captcha-timeout: 3600  # 验证码缓存时间（秒）

# ===================== 代码生成器 =====================
autocode:
  web: web/src             # 前端代码生成目录
  server: server           # 后端代码生成目录
  module: ""               # Go module 名（留空则自动从 go.mod 读取）
  ai-path: ""              # AI 服务地址（可选）
  api-key: ""              # AutoCode API Key（留空=禁用，填入=启用远程代码生成）

# ===================== 本地文件存储 =====================
local:
  path: uploads/file       # 访问路径
  store-path: uploads/file # 存储路径

excel:
  dir: ./resource/excel/   # Excel 模板目录

# ===================== 日志 =====================
zap:
  level: info              # 日志级别: debug | info | warn | error
  prefix: '[hab]'          # 日志前缀
  format: console          # 格式: console | json
  director: log            # 日志目录
  encode-level: LowercaseColorLevelEncoder  # 日志编码器
  stacktrace-key: stacktrace  # 堆栈跟踪 key
  show-line: true          # 显示调用行号
  log-in-console: true     # 同时输出到控制台
  retention-day: -1        # 日志保留天数（-1=永久）

