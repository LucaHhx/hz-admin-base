# ===================== 极简配置 =====================
# 最小可运行配置，未列出的字段均有默认值（见 config/defaults.go）
# 完整配置参考 config.example.yaml

# 数据库类型: sqlite(默认) | mysql | pgsql | mssql | oracle
system:
  db-type: sqlite

# SQLite 无需额外配置，以下默认值即可启动：
#   db-name: data        → 生成 data.db
#   addr: 9688           → 后台管理端口
#   api-addr: 9689       → 客户端 API 端口
#   jwt.signing-key      → 自动生成 UUID
#   jwt.expires-time: 7d
#   jwt.buffer-time: 1d

# ==================== 如需 MySQL ====================
# system:
#   db-type: mysql
#
# mysql:
#   path: 127.0.0.1
#   port: "3306"
#   db-name: hab
#   username: root
#   password: your-password
